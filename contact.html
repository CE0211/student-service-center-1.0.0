<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#9a4e3f" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="校园服务网站定制微信与 QQ 联系方式。" />
    <title>联系作者定制｜校园服务站定制</title>
    <link rel="icon" href="assets/creator-logo.png" type="image/png" />
    <link rel="stylesheet" href="styles.css?v=20260719-copy" />
    <script src="content.js?v=20260719-copy" defer></script>
    <script src="contact.js" defer></script>
  </head>
  <body class="contact-page">
    <header class="contact-header">
      <a class="brand" href="index.html" aria-label="返回校园服务站定制首页">
        <span class="brand-mark" data-brand-logo aria-hidden="true"></span>
        <span class="brand-copy">
          <strong>校园服务站定制</strong>
          <small>Custom Website Contact</small>
        </span>
      </a>
      <a class="back-link" href="index.html">← 返回主页</a>
    </header>

    <main class="contact-main">
      <section class="contact-hero">
        <div>
          <p class="edition">CONTACT FOR CUSTOM BUILD</p>
          <h1>想做一份<em>属于你们的校园服务站？</em></h1>
          <p>无论是迎新通知、学院服务、社团招新还是校园活动，都能根据实际使用场景做成清晰、美观、适配手机的网站。</p>
        </div>
        <aside class="contact-promise">
          <span>支持定制</span>
          <strong>页面内容、视觉风格、互动功能与后续维护均可按需组合</strong>
        </aside>
      </section>

      <section class="contact-methods" id="methods" aria-label="联系方式">
        <article class="contact-method" id="wechat">
          <div class="contact-method-head">
            <div class="contact-platform">
              <span>微</span>
              <div><strong>微信联系</strong><small>念春暄 · 山西晋中</small></div>
            </div>
          </div>
          <div class="contact-qr">
            <img src="assets/wechat-qr.png" width="928" height="1380" loading="lazy" alt="念春暄的微信二维码，扫码添加好友" />
          </div>
          <div class="contact-method-foot">
            <p>使用微信扫一扫，添加时请备注“网站定制”。</p>
          </div>
        </article>

        <article class="contact-method dark" id="qq">
          <div class="contact-method-head">
            <div class="contact-platform">
              <span>Q</span>
              <div><strong>QQ 联系</strong><small>念春暄 · 3081839269</small></div>
            </div>
          </div>
          <div class="contact-qr">
            <img src="assets/qq-qr.png" width="1061" height="1925" loading="lazy" alt="念春暄的 QQ 二维码，QQ 号 3081839269" />
          </div>
          <div class="contact-method-foot">
            <p>扫一扫添加 QQ，或复制号码后在 QQ 中搜索。</p>
            <button class="copy-contact" type="button" data-copy-qq>复制 QQ：3081839269</button>
          </div>
        </article>
      </section>

      <p class="contact-privacy">本页二维码仅用于网站定制业务联系，请勿用于骚扰、群发或其他无关用途。</p>
    </main>

    <div class="toast" role="status" aria-live="polite" data-contact-toast></div>
  </body>
</html>
